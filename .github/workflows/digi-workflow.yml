name: vars demo
run-name: ${{github.run_id}}-pavan

on:
    #push:
        #branches: ["main"]
    workflow_dispatch:
        inputs:
            version:
                type: choice
                options:
                    - v1
                    - v2
                    - v3
                default: v1

            myenv:
                type: environment
                default: dev

jobs:
    myjob:
        runs-on: ubuntu-latest
        environment: ${{inputs.myenv}}
        steps:
            - name: step1
              run: |
                echo "hi from ${{inputs.version}}"
                echo "${{vars.my_dev_user}}"
                sleep 20
    
    ourjob:
        needs: myjob
        runs-on: ubuntu-latest
        steps:
            - name: step1
              run: |
                echo "hi from ${{inputs.version}}"
                echo "${{vars.my_dev_user}}"
                sleep 15
