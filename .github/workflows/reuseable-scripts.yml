name: custom-scripts

on:
    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: step1
              run: | 
                echo "this is custom script" >> "app.txt"
            - name: step2
              uses: actions/upload-artifact@v7
              with:
                name: app-file
                path: app.txt
